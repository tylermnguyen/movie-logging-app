<head>

<title>Contact</title>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top border-bottom">
  <div class="container">
    <a class="navbar-brand" href="/index.html">Movie Log</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="siteNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0" id="mainNavLinks">
        <li class="nav-item"><a class="nav-link" href="/dashboard.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/watchlist.html">Watchlist</a></li>
        <li class="nav-item"><a class="nav-link" href="/discover.html">Discover</a></li>
        <li class="nav-item"><a class="nav-link" href="/profile.html">Profile</a></li>
        <li class="nav-item"><a class="nav-link" href="/about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="/contact.html">Contact</a></li>
        <li class="nav-item"><a class="nav-link" href="/faq.html">FAQ</a></li>
      </ul>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-light btn-sm" href="/login.html">Login</a>
        <button id="logoutBtn" class="btn btn-success btn-sm d-none">Logout</button>
      </div>
    </div>
  </div>
</nav>


<main class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card card-soft p-4">
        <h1 class="display-6 fw-bold">Contact</h1>
        <form class="vstack gap-3">
          <div><label class="form-label">Name</label><input class="form-control" type="text" placeholder="Your name" /></div>
          <div><label class="form-label">Email</label><input class="form-control" type="email" placeholder="you@example.com" /></div>
          <div><label class="form-label">Message</label><textarea class="form-control" rows="6" placeholder="How can we help?"></textarea></div>
          <button class="btn btn-success" type="button">Send message</button>
        </form>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
